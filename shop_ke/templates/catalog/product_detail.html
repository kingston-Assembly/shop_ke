{% extends 'base.html' %}
{% load humanize %}
{% block content %}
<div class="row">
  <div class="col-md-5">
    {% if product.image %}
    <img src="{{ product.image.url }}" class="img-fluid" alt="{{ product.name }}" />
    {% endif %}
  </div>
  <div class="col-md-7">
    <h2>{{ product.name }}</h2>
    <p class="lead mb-1">KSh {{ product.price|floatformat:0|intcomma }}</p>
    <p class="text-muted">{{ product.description }}</p>
    <form method="post" action="/cart/add/{{ product.id }}/">
      {% csrf_token %}
      <button class="btn btn-primary">Add to cart</button>
    </form>
  </div>
</div>
{% endblock %}
